server:
  port: 17456

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 604800000

cors:
  allowed-origins:
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"

# Конфигурация для интеграции с МЧО (Мои Чеки Онлайн)
mco:
  api:
    # ⚠️ ВАЖНО: URL для интеграции с МЧО (dr.stm-labs.ru)
    base-url: https://dr.stm-labs.ru:32355/ais3/smz/SmzIntegrationService

    # FNS-OpenApi-Token - токен доступа, полученный от ФНС России
    token: ${MCO_API_TOKEN}
    user-token: ${MCO_API_TOKEN}

    # Таймаут для SOAP запросов (в миллисекундах)
    timeout: 60000

  partner:
    # ИНН организации-партнера (из заявки в ФНС)
    inn: "5610238469"

    # Название партнера для отображения в ЛК МЧО
    name: "ЧЕК24.РФ"

    # Тип партнера (всегда PARTNER для платформ-партнеров)
    type: "PARTNER"

logging:
  level:
    root: INFO
    org.example.mcoService: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
