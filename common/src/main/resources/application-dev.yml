server:
  port: 8083
  address: 0.0.0.0
smartcaptcha:
  server-key: ${SMARTCAPTCHA_SERVER_KEY:test_key}
  validate-url: https://smartcaptcha.yandexcloud.net/validate
spring:
  webflux:
    timeout:
      read: 5s
      write: 5s
      connect: 3s
  datasource:
    url: jdbc:postgresql://localhost:5432/check_rf
    username: check_user
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
cors:
  allowed-origins:
    - "https://чек24.рф"
    - "https://www.чек24.рф"
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"
    - "http://localhost:3000"
    - "http://localhost:5173"
jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 10800000  # 3 часа (10800000 мс)
  refresh-token:
    expiration: 604800000  # 7 дней
security:
  captcha:
    enabled: true
    required-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/contact/submit
