server:
  port: 18273

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update  # изменится на validate после создания таблиц
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

cors:
  allowed-origins:
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 3600000
  refresh-token:
    expiration: 604800000

# Telegram бот для отправки кодов авторизации
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
  chat:
    id: ${TELEGRAM_CHAT_ID}
  webhook:
    url: ${TELEGRAM_WEBHOOK_URL:}  # URL webhook для получения обновлений

logging:
  level:
    root: INFO
    org.example.authService: INFO
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
