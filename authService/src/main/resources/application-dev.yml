server:
  port: ${AUTH_SERVICE_PORT:18273}
  address: 0.0.0.0

smartcaptcha:
  server-key: ${SMARTCAPTCHA_SERVER_KEY:}
  validate-url: https://smartcaptcha.yandexcloud.net/validate

spring:
  webflux:
    timeout:
      read: 5s
      write: 5s
      connect: 3s
  redis:
    host: localhost
    port: ${REDIS_PORT:16380}
    password: ${REDIS_PASSWORD}
    timeout: 2000
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15433}/${DB_NAME:check_rf}
    username: ${DB_USER:check_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

cors:
  allowed-origins:
    - "https://чек24.рф"
    - "https://www.чек24.рф"
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 10800000  # 3 часа
  refresh-token:
    expiration: 604800000  # 7 дней

# Telegram бот для отправки кодов авторизации
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:8653917011:AAGM0EczyiYlGdGITtYYkCyf9nhVSBung5E}
  chat:
    id: ${TELEGRAM_CHAT_ID:1242306774}  # ID чата для отправки кодов
  webhook:
    url: ${TELEGRAM_WEBHOOK_URL:}  # URL webhook для получения обновлений (опционально)

security:
  captcha:
    enabled: true
    required-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/contact/submit

# Логирование для аудита безопасности
logging:
  level:
    AUDIT: INFO
    org.example.authService: DEBUG
  file:
    name: /var/www/chech24rfapi/logs/auth-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Prometheus metrics и Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:auth-service}
    distribution:
      percentiles-histogram:
        http.server.requests: true
