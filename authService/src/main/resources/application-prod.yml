server:
  port: ${AUTH_SERVICE_PORT:18273}
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:check_rf}
    username: ${DB_USER:check_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  redis:
    host: ${REDIS_HOST:redis}
    port: 6379
    password: ${REDIS_PASSWORD}
    timeout: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

cors:
  allowed-origins:
    - "https://чек24.рф"
    - "https://www.чек24.рф"
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"
    - "https://api.чек24.рф"
    - "https://api.xn--24-mlcu7d.xn--p1ai"

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 10800000  # 3 часа
  refresh-token:
    expiration: 604800000  # 7 дней

# Telegram бот для отправки кодов авторизации
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
  chat:
    id: ${TELEGRAM_CHAT_ID}
  webhook:
    url: ${TELEGRAM_WEBHOOK_URL:}  # URL webhook для получения обновлений

security:
  captcha:
    enabled: true
    required-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/contact/submit
