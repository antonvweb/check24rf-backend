services:
  postgres:
    image: postgres:15-alpine
    container_name: check24_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-check_rf}
      POSTGRES_USER: ${DB_USER:-check_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8"
    ports:
      - "127.0.0.1:${DB_PORT:-15433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - check24_internal
      - check24_external
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-check_user} -d ${DB_NAME:-check_rf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: check24_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --save 900 1 --save 300 10 --save 60 100 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-16380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - check24_internal
      - check24_external
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  auth-service:
    build:
      context: .
      dockerfile: authService/Dockerfile
    container_name: check24rf-auth
    ports:
      - "127.0.0.1:${AUTH_SERVICE_PORT:-18273}:18273"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-check_rf}
      DB_USER: ${DB_USER:-check_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - check24_internal
      - check24_external
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18273/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  user-service:
    build:
      context: .
      dockerfile: userService/Dockerfile
    container_name: check24rf-user
    ports:
      - "127.0.0.1:${USER_SERVICE_PORT:-19384}:19384"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-check_rf}
      DB_USER: ${DB_USER:-check_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - check24_internal
      - check24_external
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:19384/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  mco-service:
    build:
      context: .
      dockerfile: mcoService/Dockerfile
    container_name: check24rf-mco
    ports:
      - "127.0.0.1:${MCO_SERVICE_PORT:-17456}:17456"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-check_rf}
      DB_USER: ${DB_USER:-check_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MCO_API_TOKEN: ${MCO_API_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - check24_internal
      - check24_external
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:17456/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

networks:
  check24_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
  check24_external:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
