name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9.6'

jobs:
  # ==================== BUILD ====================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn clean package -DskipTests -B -V
      env:
        MAVEN_OPTS: -Xmx2g

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: docker compose build
      env:
        DOCKER_BUILDKIT: 1

  # ==================== DEPLOY ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SERVER_HOST }}
        username: ${{ secrets.PROD_SERVER_USER }}
        key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        port: ${{ secrets.PROD_SSH_PORT }}
        script: |
          cd /var/www/check24rf-backend
          cat > .env << ENVEOF
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=${{ secrets.PROD_DB_NAME }}
          DB_USER=${{ secrets.PROD_DB_USER }}
          DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          AUTH_SERVICE_PORT=${{ secrets.PROD_AUTH_SERVICE_PORT }}
          USER_SERVICE_PORT=${{ secrets.PROD_USER_SERVICE_PORT }}
          MCO_SERVICE_PORT=${{ secrets.PROD_MCO_SERVICE_PORT }}
          ADMIN_SERVICE_PORT=${{ secrets.PROD_ADMIN_SERVICE_PORT }}
          MCO_API_TOKEN=${{ secrets.PROD_MCO_API_TOKEN }}
          SMARTCAPTCHA_SERVER_KEY=${{ secrets.PROD_SMARTCAPTCHA_SERVER_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ENVEOF
          chmod 600 .env
          chown ${{ secrets.PROD_SERVER_USER }}:${{ secrets.PROD_SERVER_USER }} .env
          echo "✓ .env file created"

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SERVER_HOST }}
        username: ${{ secrets.PROD_SERVER_USER }}
        key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        port: ${{ secrets.PROD_SSH_PORT }}
        script: |
          cd /var/www/check24rf-backend

          # Pull latest changes
          git pull origin ${{ github.ref_name }}

          # Stop containers
          docker compose down

          # Build and start containers
          docker compose build --no-cache
          docker compose up -d

          # Cleanup old images
          docker image prune -f

          # Wait for services to start
          sleep 15

          # Check health
          docker compose ps

          echo "Deployment completed at $(date)"
