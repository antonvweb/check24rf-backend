server:
  port: ${USER_SERVICE_PORT:19384}
  address: 0.0.0.0

smartcaptcha:
  server-key: ${SMARTCAPTCHA_SERVER_KEY:}
  validate-url: https://smartcaptcha.yandexcloud.net/validate

spring:
  webflux:
    timeout:
      read: 5s
      write: 5s
      connect: 3s
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:15433}/${DB_NAME:check_rf}
    username: ${DB_USER:check_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

cors:
  allowed-origins:
    - "https://чек24.рф"
    - "https://www.чек24.рф"
    - "https://xn--24-mlcu7d.xn--p1ai"
    - "https://www.xn--24-mlcu7d.xn--p1ai"

jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 10800000  # 3 часа
  refresh-token:
    expiration: 604800000  # 7 дней

security:
  captcha:
    enabled: true
    required-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/contact/submit

# Логирование для аудита безопасности
logging:
  level:
    AUDIT: INFO
    org.example.userService: DEBUG
  file:
    name: /var/www/chech24rfapi/logs/user-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Prometheus metrics и Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:user-service}
    distribution:
      percentiles-histogram:
        http.server.requests: true
