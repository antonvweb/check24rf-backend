name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9.6'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ==================== BUILD ====================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}
    
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Build with Maven
      run: mvn clean package -DskipTests -B -V
      env:
        MAVEN_OPTS: -Xmx2g
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          *.jar
          !**/target/**
        retention-days: 7
    
    - name: Upload Maven reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: maven-reports
        path: |
          **/target/surefire-reports/*.xml
          **/target/site/*.html
        retention-days: 7

  # ==================== TEST ====================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
    
    - name: Run unit tests
      run: mvn test -B
      env:
        MAVEN_OPTS: -Xmx2g
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/target/surefire-reports/
        retention-days: 7
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          **/target/surefire-reports/*.xml

  # ==================== SECURITY SCAN ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
    
    - name: Run OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -B
      continue-on-error: true
      env:
        MAVEN_OPTS: -Xmx2g
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: |
          **/target/dependency-check-report.html
          **/target/dependency-check-report.xml
        retention-days: 30
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Create .env file for Docker build
      run: |
        cat > .env << EOF
        DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
        REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
        JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
        MCO_API_TOKEN=${{ secrets.PROD_MCO_API_TOKEN }}
        EOF
        echo "✓ .env file created"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      if: github.event_name != 'pull_request'
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}

    - name: Build Docker images
      run: docker compose build
      env:
        DOCKER_BUILDKIT: 1

    - name: Save Docker images
      run: |
        docker save check24rf-auth:latest > auth-service.tar
        docker save check24rf-user:latest > user-service.tar
        docker save check24rf-mco:latest > mco-service.tar

    - name: Upload Docker images
      uses: actions/upload-artifact@v4
      with:
        name: docker-images
        path: |
          *.tar
        retention-days: 3

  # ==================== DEPLOY TO DEV ====================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file from secrets
      run: |
        ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p ${{ secrets.DEV_SSH_PORT }} \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} << EOF
            set -e
            cd \${{ secrets.DEV_DEPLOY_PATH }}
            
            echo "📝 Creating .env file..."
            cat > .env << 'ENVEOF'
            # Check24RF API Environment (Development)
            # Created by GitHub Actions
            
            # Application
            APP_USER=${{ secrets.DEV_APP_USER }}
            APP_USER_PASS=${{ secrets.DEV_APP_USER_PASS }}
            
            # Database
            DB_HOST=localhost
            DB_PORT=${{ secrets.DEV_DB_PORT }}
            DB_NAME=${{ secrets.DEV_DB_NAME }}
            DB_USER=${{ secrets.DEV_DB_USER }}
            DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
            
            # Redis
            REDIS_HOST=localhost
            REDIS_PORT=${{ secrets.DEV_REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.DEV_REDIS_PASSWORD }}
            
            # JWT
            JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
            
            # Service Ports
            AUTH_SERVICE_PORT=${{ secrets.DEV_AUTH_SERVICE_PORT }}
            USER_SERVICE_PORT=${{ secrets.DEV_USER_SERVICE_PORT }}
            MCO_SERVICE_PORT=${{ secrets.DEV_MCO_SERVICE_PORT }}
            ADMIN_SERVICE_PORT=${{ secrets.DEV_ADMIN_SERVICE_PORT }}
            
            # MCO API Token
            MCO_API_TOKEN=${{ secrets.DEV_MCO_API_TOKEN }}
            
            # SmartCaptcha
            SMARTCAPTCHA_SERVER_KEY=${{ secrets.DEV_SMARTCAPTCHA_SERVER_KEY }}
            ENVEOF
            
            chmod 600 .env
            echo "✓ .env file created"
            EOF

    - name: Deploy to development server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        port: ${{ secrets.DEV_SSH_PORT }}
        script: |
          cd /var/www/chech24rfapi
          git pull origin develop
          docker compose pull
          docker compose up -d
          docker system prune -f
          echo "Deployment to development completed at $(date)"

  # ==================== DEPLOY TO PROD ====================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test, security-scan, docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file from secrets
      run: |
        ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p ${{ secrets.PROD_SSH_PORT }} \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << EOF
            set -e
            cd \${{ secrets.PROD_DEPLOY_PATH }}
            
            echo "📝 Creating .env file..."
            cat > .env << 'ENVEOF'
            # Check24RF API Environment (Production)
            # Created by GitHub Actions - $(date -Iseconds)
            
            # Application
            APP_USER=${{ secrets.PROD_APP_USER }}
            APP_USER_PASS=${{ secrets.PROD_APP_USER_PASS }}
            
            # Database
            DB_HOST=localhost
            DB_PORT=${{ secrets.PROD_DB_PORT }}
            DB_NAME=${{ secrets.PROD_DB_NAME }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            
            # Redis
            REDIS_HOST=localhost
            REDIS_PORT=${{ secrets.PROD_REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            
            # JWT
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            
            # Service Ports
            AUTH_SERVICE_PORT=${{ secrets.PROD_AUTH_SERVICE_PORT }}
            USER_SERVICE_PORT=${{ secrets.PROD_USER_SERVICE_PORT }}
            MCO_SERVICE_PORT=${{ secrets.PROD_MCO_SERVICE_PORT }}
            ADMIN_SERVICE_PORT=${{ secrets.PROD_ADMIN_SERVICE_PORT }}
            
            # MCO API Token
            MCO_API_TOKEN=${{ secrets.PROD_MCO_API_TOKEN }}
            
            # SmartCaptcha
            SMARTCAPTCHA_SERVER_KEY=${{ secrets.PROD_SMARTCAPTCHA_SERVER_KEY }}
            ENVEOF
            
            chmod 600 .env
            chown \${{ secrets.PROD_SERVER_USER }}:\${{ secrets.PROD_SERVER_USER }} .env
            echo "✓ .env file created"
            EOF

    - name: Deploy to production server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SERVER_HOST }}
        username: ${{ secrets.PROD_SERVER_USER }}
        key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        port: ${{ secrets.PROD_SSH_PORT }}
        script: |
          cd /var/www/chech24rfapi

          # Создаём backup перед обновлением
          ./scripts/backup-db.sh || true

          # Pull и restart
          git pull origin main
          docker compose pull
          docker compose up -d

          # Cleanup
          docker system prune -f

          # Проверка здоровья сервисов
          sleep 30
          docker compose ps

          echo "Deployment to production completed at $(date)"

    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          Production Deployment ${github.ref}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Status: ${{ job.status }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
